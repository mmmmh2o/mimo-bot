name: Build & Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/node_modules/playwright/.local-browsers

jobs:
  build-full:
    name: Build Full (含浏览器)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Verify Chromium exists
        shell: bash
        run: |
          echo "=== Chromium 目录 ==="
          ls -la node_modules/playwright/.local-browsers/ || true

      - name: Build renderer
        run: npm run build:renderer

      - name: Build FULL version
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename FULL artifacts
        shell: bash
        run: |
          cd dist
          for f in *.exe; do
            mv "$f" "${f%.exe}-full.exe"
          done
          ls -lh *.exe

      - name: Upload FULL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mimo-bot-win-full
          path: dist/*.exe

  build-lite:
    name: Build Lite (不含浏览器)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build LITE version
        run: npx electron-builder --win --config electron-builder.lite.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename LITE artifacts
        shell: bash
        run: |
          cd dist
          for f in *.exe; do
            mv "$f" "${f%.exe}-lite.exe"
          done
          ls -lh *.exe

      - name: Upload LITE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mimo-bot-win-lite
          path: dist/*.exe

  release:
    name: Release
    needs: [build-full, build-lite]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download FULL artifacts
        uses: actions/download-artifact@v4
        with:
          name: mimo-bot-win-full
          path: artifacts/full

      - name: Download LITE artifacts
        uses: actions/download-artifact@v4
        with:
          name: mimo-bot-win-lite
          path: artifacts/lite

      - name: List artifacts
        run: |
          echo "=== FULL ===" && ls -lh artifacts/full/
          echo "=== LITE ===" && ls -lh artifacts/lite/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/full/*.exe
            artifacts/lite/*.exe
          draft: false
          generate_notes: true
          body: |
            ## MiMo Bot ${{ github.ref_name }}

            📦 **两个版本，按需下载：**

            | 文件 | 说明 | 包含 |
            |------|------|------|
            | `*-full.exe` | 完整安装包 | 应用 + Chromium 浏览器 |
            | `*-lite.exe` | 轻量更新包 | 仅应用（不含浏览器） |

            - **首次安装** → 下载 `full` 版
            - **老用户更新** → 下载 `lite` 版（需已安装过 full 版本）
            - 应用内自动更新会智能选择版本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
