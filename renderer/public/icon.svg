<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角方块 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 机器人脸 -->
  <circle cx="256" cy="230" r="120" fill="url(#face)" opacity="0.9"/>
  <!-- 眼睛 -->
  <circle cx="216" cy="210" r="18" fill="#1a1a2e"/>
  <circle cx="296" cy="210" r="18" fill="#1a1a2e"/>
  <!-- 嘴巴 -->
  <path d="M 216 260 Q 256 290 296 260" stroke="#1a1a2e" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- 天线 -->
  <line x1="256" y1="110" x2="256" y2="80" stroke="#4fc3f7" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="72" r="10" fill="#4fc3f7"/>
  <!-- 身体 -->
  <rect x="196" y="350" width="120" height="60" rx="16" fill="url(#face)" opacity="0.7"/>
  <!-- 文字 -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="#4fc3f7">MiMo Bot</text>
</svg>
